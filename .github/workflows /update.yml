name: 혜택존 데이터 자동 수집

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22시)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 필요 라이브러리 설치
        run: |
          pip install requests pytrends

      - name: 🚀 데이터 수집 실행
        env:
          DATA_API_KEY: ${{ secrets.DATA_API_KEY }}
          BIZ_API_KEY: ${{ secrets.BIZ_API_KEY }}
          FSS_API_KEY: ${{ secrets.FSS_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/update.py

      - name: 📤 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 데이터 자동 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push

